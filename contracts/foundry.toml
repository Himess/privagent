[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

[fuzz]
runs = 256

[profile.default.fs_permissions]
read = ["test/fixtures"]

[rpc_endpoints]
base-sepolia = "${BASE_SEPOLIA_RPC}"

[etherscan]
base-sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
